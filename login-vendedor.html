<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login Vendedor - Fashion Store</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{

background:#f5f5f5;

display:flex;

justify-content:center;

align-items:center;

min-height:100vh;

}

.contenedor{

background:white;

padding:30px;

border-radius:15px;

width:450px;

box-shadow:
0 0 15px rgba(0,0,0,.15);

}

.logo{

display:block;

margin:auto;

width:220px;

border:3px solid #D4AF37;

border-radius:15px;

margin-bottom:20px;

}

h1{

text-align:center;

color:#D4AF37;

margin-bottom:20px;

}

h2{

margin-top:20px;

margin-bottom:10px;

}

input{

width:100%;

padding:12px;

margin-bottom:10px;

border:1px solid #ccc;

border-radius:8px;

}

button{

width:100%;

padding:12px;

background:#D4AF37;

border:none;

border-radius:8px;

font-weight:bold;

cursor:pointer;

margin-top:10px;

}

button:hover{

background:#b8922e;

}

</style>

</head>

<body>

<div class="contenedor">

<img
src="img/logo-fashion-store.png"
alt="Fashion Store"
class="logo">

<h1>Fashion Store</h1>

<h2>Acceso de Vendedor</h2>

<input
type="text"
id="usuario"
placeholder="Usuario">

<input
type="password"
id="password"
placeholder="Contraseña">

<button onclick="iniciarSesion()">

Ingresar al Panel

</button>

</div>

<script>

const vendedor = {

usuario: "admin",

password: "1234"

};

function iniciarSesion(){

const usuario =
document.getElementById(
"usuario"
).value;

const password =
document.getElementById(
"password"
).value;

if(

usuario === vendedor.usuario &&
password === vendedor.password

){

localStorage.setItem(
"vendedorActivo",
"true"
);

alert(
"Bienvenido al Panel de Administración"
);

window.location.href =
"admin.html";

}else{

alert(
"Usuario o contraseña incorrectos"
);

}

}

</script>

</body>

</html>
