<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Panel Administrador - Fashion Store</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f5f5;
}

header{
background:#000;
padding:20px;
text-align:center;
}

.logo{
width:220px;
border:3px solid #D4AF37;
border-radius:15px;
}

header h1{
color:#D4AF37;
margin-top:15px;
}

.dashboard{

display:grid;

grid-template-columns:
repeat(auto-fit,minmax(250px,1fr));

gap:20px;

padding:20px;

}

.card{

background:white;

padding:20px;

border-radius:15px;

text-align:center;

box-shadow:
0 0 10px rgba(0,0,0,.15);

}

.card h2{
color:#D4AF37;
margin-bottom:10px;
}

.numero{
font-size:35px;
font-weight:bold;
}

.seccion{

background:white;

margin:20px;

padding:20px;

border-radius:15px;

box-shadow:
0 0 10px rgba(0,0,0,.15);

}

table{

width:100%;

border-collapse:collapse;

margin-top:15px;

}

th{

background:#D4AF37;

padding:12px;

}

td{

border:1px solid #ddd;

padding:10px;

text-align:center;

}

button{

padding:12px;

background:#D4AF37;

border:none;

border-radius:8px;

cursor:pointer;

font-weight:bold;

}

button:hover{
background:#b8922e;
}

footer{

background:#000;

color:white;

text-align:center;

padding:20px;

margin-top:20px;

}

</style>

</head>

<body>

<header>

<img
src="img/logo-fashion-store.png"
alt="Fashion Store"
class="logo">

<h1>Panel Administrador</h1>

</header>

<div class="dashboard">

<div class="card">

<h2>Productos</h2>

<p
class="numero"
id="totalProductos">

0

</p>

</div>

<div class="card">

<h2>Pedidos</h2>

<p
class="numero"
id="totalPedidos">

0

</p>

</div>

<div class="card">

<h2>Ventas</h2>

<p
class="numero"
id="ventasTotales">

$0

</p>

</div>

</div>

<div class="seccion">

<h2>Inventario</h2>

<table>

<thead>

<tr>

<th>Nombre</th>
<th>Categoría</th>
<th>Talla</th>
<th>Color</th>
<th>Precio</th>
<th>Stock</th>

</tr>

</thead>

<tbody id="tablaInventario">

</tbody>

</table>

</div>

<div class="seccion">

<h2>Pedidos Realizados</h2>

<table>

<thead>

<tr>

<th>Pedido</th>
<th>Cliente</th>
<th>Fecha</th>
<th>Total</th>

</tr>

</thead>

<tbody id="tablaPedidos">

</tbody>

</table>

</div>

<div class="seccion">

<button onclick="limpiarPedidos()">
Eliminar Todos los Pedidos
</button>

</div>

<footer>

<h3>Fashion Store © 2026</h3>

<p>
Universidad Santa Fe,
Aguascalientes
</p>

</footer>

<script>

let inventario =
JSON.parse(
localStorage.getItem(
"inventario"
)
) || [];

let pedidos =
JSON.parse(
localStorage.getItem(
"pedidos"
)
) || [];

function cargarDashboard(){

document.getElementById(
"totalProductos"
).textContent =
inventario.length;

document.getElementById(
"totalPedidos"
).textContent =
pedidos.length;

let ventas = 0;

pedidos.forEach(p=>{

ventas +=
Number(p.total);

});

document.getElementById(
"ventasTotales"
).textContent =
"$" +
ventas.toFixed(2);

}
  function actualizarDatos(){

inventario =
JSON.parse(
localStorage.getItem("inventario")
) || [];

pedidos =
JSON.parse(
localStorage.getItem("pedidos")
) || [];

actualizarDatos();

}

function cargarInventario(){

const tabla =
document.getElementById(
"tablaInventario"
);

tabla.innerHTML = "";

inventario.forEach(producto=>{

tabla.innerHTML += `

<tr>

<td>${producto.nombre}</td>

<td>${producto.categoria}</td>

<td>${producto.talla}</td>

<td>${producto.color}</td>

<td>$${producto.precio}</td>

<td>${producto.stock}</td>

</tr>

`;

});

}

function cargarPedidos(){

const tabla =
document.getElementById(
"tablaPedidos"
);

tabla.innerHTML = "";

pedidos.forEach(pedido=>{

tabla.innerHTML += `

<tr>

<td>${pedido.id}</td>

<td>${pedido.fecha}</td>

<td>$${pedido.total}</td>

</tr>

`;

});

}

function limpiarPedidos(){

if(
confirm(
"¿Eliminar todos los pedidos?"
)
){

localStorage.removeItem(
"pedidos"
);

pedidos = [];

cargarPedidos();

cargarDashboard();

}

}

cargarDashboard();
cargarInventario();
cargarPedidos();

</script>

</body>

</html>
