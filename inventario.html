<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Inventario - Fashion Store</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f5f5f5;
    padding:20px;
}

header{
    background:#000;
    text-align:center;
    padding:20px;
    border-radius:15px;
    margin-bottom:20px;
}

.logo{
    width:250px;
    border:3px solid #D4AF37;
    border-radius:15px;
}

header h1{
    color:#D4AF37;
    margin-top:15px;
}

.formulario{

    background:white;

    padding:20px;

    border-radius:15px;

    margin-bottom:20px;

    box-shadow:0 0 10px rgba(0,0,0,.15);

}

.formulario h2{
    margin-bottom:15px;
}

input,
select{

    width:100%;

    padding:12px;

    margin-bottom:10px;

    border:1px solid #ccc;

    border-radius:8px;

}

button{

    background:#D4AF37;

    border:none;

    padding:12px;

    border-radius:8px;

    cursor:pointer;

    font-weight:bold;

}

button:hover{
    background:#b8922e;
}

table{

    width:100%;

    border-collapse:collapse;

    background:white;

}

th{

    background:#D4AF37;

    padding:12px;

}

td{

    border:1px solid #ddd;

    padding:10px;

    text-align:center;

}

img.producto{

    width:80px;
    height:80px;
    object-fit:cover;

}

.eliminar{

    background:#dc3545;
    color:white;

}

</style>

</head>

<body>

<header>

<img
src="img/logo-fashion-store.png"
alt="Fashion Store"
class="logo">

<h1>Inventario Fashion Store</h1>

</header>

<div class="formulario">

<h2>Agregar Producto</h2>

<input
type="text"
id="nombre"
placeholder="Nombre del producto">

<select id="categoria">

<option value="">
Categoría
</option>

<option>
Camisa casual
</option>

<option>
Pantalón
</option>

<option>
Vestido
</option>

<option>
Blusa Moderna
</option>

<option>
Gorra
</option>

<option>
Zapatilla elegante
</option>

</select>

<input
type="text"
id="talla"
placeholder="Talla">

<input
type="text"
id="color"
placeholder="Color">

<input
type="number"
id="precio"
placeholder="Precio">

<input
type="number"
id="stock"
placeholder="Stock">

<input
type="text"
id="imagen"
placeholder="Ruta imagen (ej: img/camisa.jpg)">

<button onclick="guardarProducto()">
Guardar Producto
</button>

</div>

<table>

<thead>

<tr>

<th>ID</th>
<th>Imagen</th>
<th>Nombre</th>
<th>Categoría</th>
<th>Talla</th>
<th>Color</th>
<th>Precio</th>
<th>Stock</th>
<th>Acciones</th>

</tr>

</thead>

<tbody id="tablaInventario">

</tbody>

</table>

<script>

let inventario =
JSON.parse(
localStorage.getItem(
"inventario"
)
) || [];

function guardarInventario(){

localStorage.setItem(
"inventario",
JSON.stringify(inventario)
);

}

function cargarInventario(){

const tabla =
document.getElementById(
"tablaInventario"
);

tabla.innerHTML = "";

inventario.forEach(producto=>{

tabla.innerHTML += `

<tr>

<td>${producto.id}</td>

<td>

<img
src="${producto.imagen}"
class="producto">

</td>

<td>${producto.nombre}</td>

<td>${producto.categoria}</td>

<td>${producto.talla}</td>

<td>${producto.color}</td>

<td>$${producto.precio}</td>

<td>${producto.stock}</td>

<td>

<button
class="eliminar"
onclick="eliminarProducto(${producto.id})">

Eliminar

</button>

</td>

</tr>

`;

});

}

function guardarProducto(){

const nombre =
document.getElementById(
"nombre"
).value;

const categoria =
document.getElementById(
"categoria"
).value;

const talla =
document.getElementById(
"talla"
).value;

const color =
document.getElementById(
"color"
).value;

const precio =
document.getElementById(
"precio"
).value;

const stock =
document.getElementById(
"stock"
).value;

const imagen =
document.getElementById(
"imagen"
).value;

if(
nombre===""||
categoria===""||
talla===""||
color===""||
precio===""||
stock===""||
imagen===""){

alert(
"Completa todos los campos"
);

return;

}

const producto = {

id: Date.now(),

nombre,

categoria,

talla,

color,

precio,

stock,

imagen

};

inventario.push(
producto
);

guardarInventario();

cargarInventario();

document.getElementById(
"nombre"
).value = "";

document.getElementById(
"categoria"
).value = "";

document.getElementById(
"talla"
).value = "";

document.getElementById(
"color"
).value = "";

document.getElementById(
"precio"
).value = "";

document.getElementById(
"stock"
).value = "";

document.getElementById(
"imagen"
).value = "";

}

function eliminarProducto(id){

if(
confirm(
"¿Eliminar producto?"
)
){

inventario =
inventario.filter(
p => p.id !== id
);

guardarInventario();

cargarInventario();

}

}

cargarInventario();

</script>

</body>

</html>
